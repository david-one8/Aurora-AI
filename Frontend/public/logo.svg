<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <defs>
    <!-- Grayscale gradient -->
    <linearGradient id="gradA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#cfcfcf"/>
      <stop offset="100%" stop-color="#5a5a5a"/>
    </linearGradient>

    <!-- Subtle glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" rx="60" fill="#050505"/>

  <!-- Main A -->
  <text x="50%" y="58%"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="Inter, SF Pro Display, system-ui, sans-serif"
        font-size="160"
        font-weight="600"
        letter-spacing="-2"
        fill="url(#gradA)">
    A
  </text>

  <!-- Soft highlight layer -->
  <text x="50%" y="58%"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="Inter, SF Pro Display, system-ui, sans-serif"
        font-size="160"
        font-weight="600"
        letter-spacing="-2"
        fill="#ffffff"
        opacity="0.05"
        filter="url(#glow)">
    A
  </text>

</svg>